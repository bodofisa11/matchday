name: Release notes check

# Every PR targeting main MUST add a bullet under the "## Upcoming" section
# of RELEASE.md. To bypass (rare: pure docs/CI changes), apply the
# "no-release-note" label to the PR.

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if labeled no-release-note
        if: contains(github.event.pull_request.labels.*.name, 'no-release-note')
        run: |
          echo "Skipping — PR is labeled 'no-release-note'."
          exit 0

      - name: Checkout PR
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-release-note') }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify RELEASE.md was updated
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'no-release-note') }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          if ! git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qx "RELEASE.md"; then
            echo "::error::This PR does not modify RELEASE.md."
            echo "Add a bullet under '## Upcoming' describing your change, or label the PR 'no-release-note' if truly N/A."
            exit 1
          fi

          # Require the diff to actually touch the Upcoming block, not just historical sections.
          if ! git diff "$BASE_SHA" "$HEAD_SHA" -- RELEASE.md | grep -E '^\+' | grep -qvE '^\+\+\+'; then
            echo "::error::RELEASE.md was touched but no lines were added."
            exit 1
          fi

          # Make sure an Upcoming header exists.
          if ! grep -q '^## Upcoming' RELEASE.md; then
            echo "::error::RELEASE.md is missing the '## Upcoming' section."
            exit 1
          fi

          echo "RELEASE.md updated. OK."
