name: Auto-assign PR

# Assign every new/reopened PR to the repo owner (bodofisa11) so it shows up
# in their assigned-issues list. GitHub does not allow requesting a review
# from the PR author, so we use the assignee field instead.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign bodofisa11
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --add-assignee bodofisa11
