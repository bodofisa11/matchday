name: Deploy to GitHub Pages

# Manual / tag-driven deploys only. We do NOT auto-deploy on every push to main.
# Workflow:
#   1. Bundle multiple features into main via normal PR flow.
#   2. When ready to release, push a semver tag:
#        - Production:  v1.2.0
#        - Test build:  v1.2.0-rc.1   (also: -rc.N, -beta.N, -alpha.N)
#      Both deploy to the same GitHub Pages URL (prerelease overwrites until the
#      next prod tag re-deploys).
#   3. Or trigger from the Actions tab with a custom version label.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"
      - "v*.*.*-beta.*"
      - "v*.*.*-alpha.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to embed in the build (e.g. v1.2.0 or dev)."
        required: true
        default: "dev"

permissions:
  contents: write   # needed to create GitHub Releases on tag push
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version label
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BASE_PATH: /matchday
          NEXT_PUBLIC_APP_VERSION: ${{ steps.ver.outputs.version }}
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publish a GitHub Release for every tag push, so the repo's right-hand
  # "Releases" sidebar always shows the latest deployed version. Notes are
  # extracted from RELEASE.md (the section matching the tag). Pre-release
  # tags (-rc, -beta, -alpha) are marked accordingly so they don't claim
  # the "Latest" badge.
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from RELEASE.md
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          # Pull the lines between "## <tag> — ..." and the next "## " (or EOF).
          awk -v tag="$TAG" '
            $0 ~ "^## " tag " " { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' RELEASE.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release notes not found in RELEASE.md for tag $TAG — using a stub." >&2
            echo "Deployment of \`$TAG\`. See [RELEASE.md](RELEASE.md) for details." > release-notes.md
          fi

      - name: Determine release flags
        id: flags
        run: |
          TAG="${{ github.ref_name }}"
          case "$TAG" in
            *-rc.*|*-beta.*|*-alpha.*)
              echo "prerelease=true"  >> $GITHUB_OUTPUT
              echo "latest=false"     >> $GITHUB_OUTPUT
              ;;
            *)
              echo "prerelease=false" >> $GITHUB_OUTPUT
              echo "latest=true"      >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          LATEST_FLAG="--latest"
          if [ "${{ steps.flags.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
            LATEST_FLAG="--latest=false"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG $LATEST_FLAG
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG $LATEST_FLAG
          fi
