name: Deploy to GitHub Pages

# Tag-driven deploys only. Pushes to `main` do NOT deploy. Two entry points:
#
#   A) Tag push (`v*.*.*` and pre-release variants) — canonical trigger when
#      a human (or external automation) pushes a semver tag. Build runs from
#      the tag ref. Tag already exists, so the tag-creation step is skipped.
#
#   B) Manual `workflow_dispatch` from the Actions tab — pick a bump type
#      (major / minor / patch) and an optional pre-release channel
#      (none / rc / beta / alpha). Order of operations:
#         1. Compute next version + capture HEAD SHA of the dispatch ref.
#         2. Build at that SHA with the version embedded.
#         3. Deploy to Pages.
#         4. ONLY THEN create the git tag at the captured SHA and push it.
#         5. Create the GitHub Release.
#      Failure in build or deploy aborts before any tag is created — no
#      orphan tags pointing at broken commits.
#
#      Why not let a tag push re-enter the workflow on dispatch? GitHub
#      Actions intentionally does NOT trigger workflows on refs created by
#      `GITHUB_TOKEN`, to prevent recursion. So the dispatch path must do
#      build + deploy + release itself.
#
# Prerelease tags (-rc/-beta/-alpha) deploy to the same Pages URL and
# overwrite prod until the next prod tag re-deploys.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"
      - "v*.*.*-beta.*"
      - "v*.*.*-alpha.*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump applied to the latest tag."
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Pre-release channel (none = production tag)."
        required: true
        type: choice
        default: none
        options:
          - none
          - rc
          - beta
          - alpha

permissions:
  contents: write   # needed to create tags + GitHub Releases
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # Dispatch-only: compute the next semver version and capture the SHA we
  # will tag if the deploy succeeds. No tag is created here.
  # -----------------------------------------------------------------------
  compute-version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture dispatch SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ github.event.inputs.bump }}
          PRE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail

          # Latest production tag (ignore pre-release tags when picking a base).
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -Ev -- '-(rc|beta|alpha)\.' \
            | sort -V | tail -n1 || true)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
            echo "No prior prod tag found — starting from v0.0.0."
          fi
          echo "Latest prod tag: $LATEST"

          VER=${LATEST#v}
          MAJOR=${VER%%.*}
          REST=${VER#*.}
          MINOR=${REST%%.*}
          PATCH=${REST#*.}

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump: $BUMP" >&2; exit 1 ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"

          # Optional pre-release suffix: pick the next sequential N by scanning
          # existing tags for that channel.
          if [ "$PRE" != "none" ]; then
            EXISTING=$(git tag --list "${NEXT}-${PRE}.*" | sort -V | tail -n1 || true)
            if [ -z "$EXISTING" ]; then
              N=1
            else
              N=${EXISTING##*.}
              N=$((N + 1))
            fi
            NEXT="${NEXT}-${PRE}.${N}"
          fi

          # Safety: refuse if the computed tag already exists.
          if git rev-parse -q --verify "refs/tags/$NEXT" >/dev/null; then
            echo "Tag $NEXT already exists — aborting." >&2
            exit 1
          fi

          echo "Next version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

  # -----------------------------------------------------------------------
  # Build the static site. Runs on tag push (build from tag ref) or after
  # a successful compute-version (build from captured dispatch SHA).
  # -----------------------------------------------------------------------
  build:
    needs: [compute-version]
    if: |
      always() && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && needs.compute-version.result == 'success')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version + ref
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ needs.compute-version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "ref=${{ needs.compute-version.outputs.sha }}"          >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.ref }}"          >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BASE_PATH: /matchday
          NEXT_PUBLIC_APP_VERSION: ${{ steps.ver.outputs.version }}
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: [build]
    if: always() && needs.build.result == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # -----------------------------------------------------------------------
  # Dispatch-only: now that deploy succeeded, create + push the tag at the
  # captured SHA. Skipped on the tag-push entry (tag already exists).
  # -----------------------------------------------------------------------
  tag:
    needs: [compute-version, deploy]
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.compute-version.outputs.sha }}

      - name: Create and push tag
        env:
          NEXT: ${{ needs.compute-version.outputs.version }}
          SHA:  ${{ needs.compute-version.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$NEXT" >/dev/null; then
            echo "Tag $NEXT already exists — aborting." >&2
            exit 1
          fi
          git tag -a "$NEXT" -m "Release $NEXT" "$SHA"
          git push origin "$NEXT"
          echo "Tagged $SHA as $NEXT after successful deploy."

  # -----------------------------------------------------------------------
  # Publish a GitHub Release for the deployed tag. On dispatch this needs
  # the tag job (which created the tag); on tag push the tag exists already.
  # -----------------------------------------------------------------------
  release:
    needs: [compute-version, deploy, tag]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (github.event_name == 'push' || needs.tag.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ needs.compute-version.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.tag }}

      - name: Extract release notes from RELEASE.md
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          awk -v tag="$TAG" '
            $0 ~ "^## " tag " " { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' RELEASE.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release notes not found in RELEASE.md for tag $TAG — using a stub." >&2
            echo "Deployment of \`$TAG\`. See [RELEASE.md](RELEASE.md) for details." > release-notes.md
          fi

      - name: Determine release flags
        id: flags
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          case "$TAG" in
            *-rc.*|*-beta.*|*-alpha.*)
              echo "prerelease=true"  >> $GITHUB_OUTPUT
              echo "latest=false"     >> $GITHUB_OUTPUT
              echo "Pre-release tag $TAG — not latest."
              exit 0
              ;;
            *)
              echo "prerelease=false" >> $GITHUB_OUTPUT
              ;;
          esac

          # Only mark a prod tag as "Latest" if the tagged commit is reachable
          # from origin/main. Tags from feature branches stay non-latest.
          git fetch --no-tags origin main:refs/remotes/origin/main
          TAG_SHA=$(git rev-list -n 1 "$TAG")
          if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "latest=true"  >> $GITHUB_OUTPUT
            echo "Tag $TAG is on main — marking Latest."
          else
            echo "latest=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG is NOT on main — skipping Latest."
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.flags.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if [ "${{ steps.flags.outputs.latest }}" = "true" ]; then
            LATEST_FLAG="--latest"
          else
            LATEST_FLAG="--latest=false"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG $LATEST_FLAG
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG $LATEST_FLAG
          fi
