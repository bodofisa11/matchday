name: Deploy to GitHub Pages

# Manual / tag-driven deploys only. We do NOT auto-deploy on every push to main.
# Workflow:
#   1. Bundle multiple features into main via normal PR flow.
#   2. When ready to release, push a semver tag:
#        - Production:  v1.2.0
#        - Test build:  v1.2.0-rc.1   (also: -rc.N, -beta.N, -alpha.N)
#      Both deploy to the same GitHub Pages URL (prerelease overwrites until the
#      next prod tag re-deploys).
#   3. Or trigger from the Actions tab with a custom version label.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"
      - "v*.*.*-beta.*"
      - "v*.*.*-alpha.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to embed in the build (e.g. v1.2.0 or dev)."
        required: true
        default: "dev"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version label
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BASE_PATH: /matchday
          NEXT_PUBLIC_APP_VERSION: ${{ steps.ver.outputs.version }}
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
