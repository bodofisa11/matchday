name: Deploy to GitHub Pages

# Tag-driven deploys only. Pushes to `main` do NOT deploy. Two entry points:
#
#   A) Tag push (`v*.*.*` and pre-release variants) — the canonical deploy
#      trigger. Builds the Next.js site with the tag embedded as
#      NEXT_PUBLIC_APP_VERSION, publishes to GitHub Pages, and creates a
#      GitHub Release with notes pulled from RELEASE.md.
#
#   B) Manual `workflow_dispatch` from the Actions tab — pick a bump type
#      (major / minor / patch) and an optional pre-release channel
#      (none / rc / beta / alpha). The workflow computes the next version
#      from the latest existing tag, creates the tag, and pushes it. The
#      tag push then triggers entry point (A).
#
# Prerelease tags (-rc/-beta/-alpha) deploy to the same Pages URL and
# overwrite prod until the next prod tag re-deploys.

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"
      - "v*.*.*-beta.*"
      - "v*.*.*-alpha.*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump applied to the latest tag."
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Pre-release channel (none = production tag)."
        required: true
        type: choice
        default: none
        options:
          - none
          - rc
          - beta
          - alpha

permissions:
  contents: write   # needed to create tags + GitHub Releases on tag push
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------------------
  # Manual dispatch path: compute next version from latest tag, then create
  # and push the tag. The tag push re-enters this workflow via the
  # `push: tags` trigger and the build/deploy/release jobs do the actual
  # publish.
  # -----------------------------------------------------------------------
  bump-and-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ github.event.inputs.bump }}
          PRE: ${{ github.event.inputs.prerelease }}
        run: |
          set -euo pipefail

          # Latest production tag (ignore pre-release tags when picking a base).
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -Ev -- '-(rc|beta|alpha)\.' \
            | sort -V | tail -n1 || true)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
            echo "No prior prod tag found — starting from v0.0.0."
          fi
          echo "Latest prod tag: $LATEST"

          # Parse MAJOR.MINOR.PATCH out of vX.Y.Z.
          VER=${LATEST#v}
          MAJOR=${VER%%.*}
          REST=${VER#*.}
          MINOR=${REST%%.*}
          PATCH=${REST#*.}

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump: $BUMP" >&2; exit 1 ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"

          # Optional pre-release suffix. For -rc/-beta/-alpha we pick the
          # next sequential N by scanning existing tags for that channel.
          if [ "$PRE" != "none" ]; then
            EXISTING=$(git tag --list "${NEXT}-${PRE}.*" | sort -V | tail -n1 || true)
            if [ -z "$EXISTING" ]; then
              N=1
            else
              N=${EXISTING##*.}
              N=$((N + 1))
            fi
            NEXT="${NEXT}-${PRE}.${N}"
          fi

          echo "Next version: $NEXT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          NEXT: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$NEXT" >/dev/null; then
            echo "Tag $NEXT already exists — aborting to avoid clobber." >&2
            exit 1
          fi
          git tag -a "$NEXT" -m "Release $NEXT"
          git push origin "$NEXT"
          echo "Pushed $NEXT — tag push will trigger build/deploy/release."

  # -----------------------------------------------------------------------
  # Tag-push path: build, deploy to Pages, publish GitHub Release.
  # -----------------------------------------------------------------------
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version label
        id: ver
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BASE_PATH: /matchday
          NEXT_PUBLIC_APP_VERSION: ${{ steps.ver.outputs.version }}
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publish a GitHub Release for every tag push, so the repo's right-hand
  # "Releases" sidebar always shows the latest deployed version. Notes are
  # extracted from RELEASE.md (the section matching the tag). Pre-release
  # tags (-rc, -beta, -alpha) are marked accordingly so they don't claim
  # the "Latest" badge.
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history to test whether the tagged commit is reachable
          # from main (decides the "Latest" flag).
          fetch-depth: 0

      - name: Extract release notes from RELEASE.md
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          # Pull the lines between "## <tag> — ..." and the next "## " (or EOF).
          awk -v tag="$TAG" '
            $0 ~ "^## " tag " " { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' RELEASE.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release notes not found in RELEASE.md for tag $TAG — using a stub." >&2
            echo "Deployment of \`$TAG\`. See [RELEASE.md](RELEASE.md) for details." > release-notes.md
          fi

      - name: Determine release flags
        id: flags
        run: |
          TAG="${{ github.ref_name }}"

          # Pre-release tags (-rc/-beta/-alpha) never claim "Latest" regardless of branch.
          case "$TAG" in
            *-rc.*|*-beta.*|*-alpha.*)
              echo "prerelease=true"  >> $GITHUB_OUTPUT
              echo "latest=false"     >> $GITHUB_OUTPUT
              echo "Pre-release tag $TAG — not latest."
              exit 0
              ;;
            *)
              echo "prerelease=false" >> $GITHUB_OUTPUT
              ;;
          esac

          # Only mark a prod tag as "Latest" if the tagged commit is reachable
          # from origin/main. Tags pushed from feature branches are still
          # deployed + released, but don't take the Latest badge.
          git fetch --no-tags origin main:refs/remotes/origin/main
          if git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "latest=true"  >> $GITHUB_OUTPUT
            echo "Tag $TAG is on main — marking Latest."
          else
            echo "latest=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG is NOT on main — skipping Latest."
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.flags.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if [ "${{ steps.flags.outputs.latest }}" = "true" ]; then
            LATEST_FLAG="--latest"
          else
            LATEST_FLAG="--latest=false"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG $LATEST_FLAG
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG $LATEST_FLAG
          fi
